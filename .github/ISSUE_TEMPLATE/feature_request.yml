name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
assignees:
  - asshat1981ar
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide as much detail as possible.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Toolbank MCP — Harvester / Crawler
        - Toolbank MCP — Extractors
        - Toolbank MCP — Normaliser / Deduper / Verifier
        - Toolbank MCP — Registry / Storage
        - Toolbank MCP — MCP Server
        - Toolbank MCP — CLI
        - Toolbank MCP — Gap Miner
        - No-Bull Marketing — UI
        - No-Bull Marketing — CMS / Content
        - Documentation
        - CI/CD
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? What use case does it enable?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like this feature to work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider? Why is your proposed solution better?
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have checked the ROADMAP.md to confirm this isn't already planned
          required: true
        - label: This feature would not violate the hard constraints in GUARDRAILS.md
          required: true
