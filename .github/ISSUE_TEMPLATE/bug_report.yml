name: Bug Report
description: Report a bug in Toolbank MCP or the No-Bull Marketing site
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - asshat1981ar
body:
  - type: markdown
    attributes:
      value: |
        Thank you for filing a bug report! Please fill out all sections below.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - Toolbank MCP — Harvester / Crawler
        - Toolbank MCP — Extractor (OpenAPI)
        - Toolbank MCP — Extractor (GitHub)
        - Toolbank MCP — Extractor (Docs/LLM)
        - Toolbank MCP — Normaliser
        - Toolbank MCP — Deduper
        - Toolbank MCP — Verifier
        - Toolbank MCP — Registry / Database
        - Toolbank MCP — Vector Store (ChromaDB)
        - Toolbank MCP — MCP Server (search_tools)
        - Toolbank MCP — MCP Server (execute_tool)
        - Toolbank MCP — CLI
        - Toolbank MCP — Gap Miner
        - No-Bull Marketing — UI Component
        - No-Bull Marketing — Build / Deploy
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the bug?
      placeholder: |
        1. Run `toolbank harvest --url https://...`
        2. Observe error message
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened? Include error messages and stack traces.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, Node version, OS, relevant package versions.
      placeholder: |
        Python: 3.11.5
        OS: macOS 14.2
        mcp: 1.2.0
        chromadb: 0.5.3
    validations:
      required: false
